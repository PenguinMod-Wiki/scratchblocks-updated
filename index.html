<style>
  .CodeMirror {
    height: 100%;
  }

  .zoom-hint {
    font-size: 0.8em;
    margin-left: 1.5em;
    color: var(--cm-comment);
  }

  @media screen and (max-width: 480px) {
    .zoom-hint {
      display: block;
      margin-left: 0;
      margin-top: 0.5em;
    }
  }

<style>
  #preview>svg {
    display: block;
    margin-bottom: 20px;
    max-width: 100%;
    height: auto;
  }

  #preview:before {
    position: relative;
    left: 1px;
    min-width: 695px;
    min-height: 842px;
    z-index: 1;
    transform: scale(0.66666);
    transform-origin: 0 0;
  }

  @media screen and (max-width: 48em) {
    #preview:before {
      transform: scale(0.5);
      min-width: 520px;
      min-height: 630px;
    }
  }

  @media screen and (max-width: 32em) {
    #preview:before {
      transform: scale(0.4);
      min-width: 415px;
      min-height: 505px;
    }
  }

  .cmp #preview:before,
  .diff #preview:before {
    position: absolute;
    display: block;
    content: "";
    background: url(screenshot.png) no-repeat -2px -3px;
  }

  .cmp.diff #preview:before {
    -webkit-filter: invert(100%) opacity(50%);
  }

  .diff #preview:before {
    -webkit-filter: opacity(50%);
  }

  .cmp img {
    display: none;
  }

  .modal {
    display: none;
    position: fixed;
    z-index: 2000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    overflow: auto;
    background-color: rgba(0, 0, 0, 0.5);
    -webkit-backdrop-filter: blur(2px);
  }

  .modal-content {
    background-color: var(--container-bg);
    margin: 5% auto;
    padding: 2rem;
    border: 1px solid var(--container-border);
    width: 90%;
    max-width: 600px;
    border-radius: 8px;
    position: relative;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    color: var(--text-color);
  }

  .close-button {
    position: absolute;
    top: 0.5rem;
    right: 0.5rem;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.75rem;
    font-weight: bold;
    cursor: pointer;
    color: var(--text-color);
    line-height: 1;
    user-select: none;
    border-radius: 4px;
    transition: background 0.2s;
  }

  .close-button:hover {
    background: var(--link-hover-bg);
  }

  .modal #custom-icons-section {
    margin-top: 0;
    padding-top: 0;
    border-top: none;
  }

  @media screen and (max-width: 48em) {
    .modal-content {
      margin: 10% auto;
      padding: 1.5rem;
      width: 95%;
    }
  }

  .dropdown {
    position: relative;
    display: inline-block;
  }

  .dropdown-content {
    display: none;
    position: absolute;
    background-color: var(--container-bg);
    min-width: 160px;
    box-shadow: 0px 8px 16px 0px rgba(0, 0, 0, 0.2);
    z-index: 1000;
    border: 1px solid var(--container-border);
    border-radius: 4px;
    top: 100%;
    left: 0;
    margin-top: 0;
    padding-top: 0.25em;
  }

  .dropdown-content a {
    color: var(--text-color);
    padding: 12px 16px;
    text-decoration: none;
    display: block;
    background: none;
    border-bottom: 1px solid var(--container-border);
  }

  .dropdown-content a:last-child {
    border-bottom: none;
  }

  .dropdown-content a:hover {
    background-color: var(--link-hover-bg);
  }

  .dropdown:hover .dropdown-content {
    display: block;
  }

  #tools-link {
    background: var(--link-bg);
  }

  #tools-link:hover {
    background: var(--link-hover-bg);
  }
</style>

<script>
  var customIcons = {};
  try {
    var savedIcons = localStorage.getItem('penguinblocks-custom-icons');
    if (savedIcons) {
      customIcons = JSON.parse(savedIcons);
    } else {
      customIcons = {
        "smiley": "data:image/svg+xml;base64,PHN2ZyB2aWV3Qm94PSIwIDAgMjAgMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMTAiIGN5PSIxMCIgcj0iOCIgZmlsbD0iI2ZmYmIxZSIvPjxjaXJjbGUgY3g9IjciIGN5PSI4IiByPSIxIi8+PGNpcmNsZSBjeD0iMTMiIGN5PSI4IiByPSIxIi8+PHBhdGggZD0iTTcgMTMgcTMgMiA2IDAiIGZpbGw9Im5vbmUiIHN0cm9rZT0iIzAwMCIgc3Ryb2tlLXdpZHRoPSIwLjUiLz48L3N2Zz4="
      };
    }
  } catch (e) { }

  function updateIconsList() {
    var list = document.getElementById('custom-icons-list');
    list.innerHTML = "";
    Object.keys(customIcons).forEach(function (name) {
      var li = document.createElement('li');
      li.className = "custom-icon-item";

      var preview = document.createElement('div');
      preview.className = "custom-icon-preview";

      var data = customIcons[name];
      if (data.trim().startsWith("<svg") || data.trim().startsWith("<g")) {
        preview.innerHTML = data;
        var svg = preview.querySelector('svg');
        if (svg) {
          svg.setAttribute('width', '24');
          svg.setAttribute('height', '24');
        }
      } else {
        var img = document.createElement('img');
        img.src = data;
        preview.appendChild(img);
      }

      var nameSpan = document.createElement('span');
      nameSpan.className = "custom-icon-name";
      nameSpan.textContent = "@" + name;

      var delBtn = document.createElement('button');
      delBtn.className = "delete-icon-btn";
      delBtn.title = "Delete icon";
      delBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>';
      delBtn.onclick = function () {
        delete customIcons[name];
        localStorage.setItem('penguinblocks-custom-icons', JSON.stringify(customIcons));
        updateIconsList();
        objUpdated();
      };

      li.appendChild(preview);
      li.appendChild(nameSpan);
      li.appendChild(delBtn);
      list.appendChild(li);
    });
  }

  document.getElementById('add-icon-btn').addEventListener('click', function () {
    var name = document.getElementById('new-icon-name').value.trim();
    var data = document.getElementById('new-icon-data').value.trim();
    if (name && data) {
      customIcons[name] = data;
      localStorage.setItem('penguinblocks-custom-icons', JSON.stringify(customIcons));
      updateIconsList();
      objUpdated();
      document.getElementById('new-icon-name').value = "";
      document.getElementById('new-icon-data').value = "";
    }
  });

  document.getElementById('icon-file-upload').addEventListener('change', function (e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function (e) {
      document.getElementById('new-icon-data').value = e.target.result;
      if (!document.getElementById('new-icon-name').value) {
        var name = file.name.split('.')[0].replace(/[^a-zA-Z0-9_-]/g, "");
        document.getElementById('new-icon-name').value = name;
      }
    };
    reader.readAsDataURL(file);
  });

  var lineCache = new Map();
  function getLineData(text) {
    if (lineCache.has(text)) return lineCache.get(text);
    
    var doc = penguinblocks.parse(text, {
      languages: obj.lang ? ['en', obj.lang] : ['en'],
      icons: customIcons,
    });
    
    var tokens = [];
    if (doc.scripts.length > 0) {
      var script = doc.scripts[0];
      
      function collectTokens(x) {
        if (x.isBlock) {
          var category = x.info.category || "obsolete";
          x.children.forEach(child => {
            if (child.isLabel) {
              tokens.push({
                text: child.value,
                style: "s-" + category
              });
            } else if (child.isIcon) {
              tokens.push({
                text: "@" + child.name,
                style: "variable-2"
              });
            } else if (child.isInput) {
              var style = "string";
              if (child.shape === "number" || child.shape === "number-dropdown") style = "number";
              if (child.shape === "boolean") style = "bracket";
              
              tokens.push({
                text: child.value,
                style: style,
                isInput: true,
                shape: child.shape
              });
            } else if (child.isBlock) {
              collectTokens(child);
            }
          });
          if (x.comment) {
            tokens.push({
              text: "// " + x.comment.label.value,
              style: "s-comment"
            });
          }
        } else if (x.isScript) {
          x.blocks.forEach(collectTokens);
        } else if (x.isComment) {
          tokens.push({
            text: "// " + x.label.value,
            style: "s-comment"
          });
        }
      }
      collectTokens(script);
    }
    
    lineCache.set(text, tokens);
    return tokens;
  }

  CodeMirror.defineMode("scratchblocks", function () {
    return {
      startState: function() {
        return {
          tokenizeIdx: 0,
          lastLine: null
        };
      },
      token: function (stream, state) {
        if (stream.sol()) {
          state.tokenizeIdx = 0;
          state.lastLine = stream.string;
        }
        
        var tokens = getLineData(state.lastLine);
        
        if (stream.eatSpace()) return null;

        if (state.tokenizeIdx >= tokens.length) {
          if (stream.match(/^::/)) return "keyword";
          var m = stream.match(/^[a-zA-Z0-9\u00C0-\u017F]+/);
          if (m) return "variable";
          stream.next();
          return null;
        }

        var token = tokens[state.tokenizeIdx];
        
        if (token.style === "s-comment") {
          if (stream.match("//")) {
             stream.skipToEnd();
             state.tokenizeIdx++;
             return "s-comment";
          }
        }
        
        if (stream.peek() === ":" && stream.match(/^::/)) {
          return "keyword";
        }

        var textToMatch = token.text;
        if (token.isInput) {
           if (token.shape === "number" || token.shape === "number-dropdown") {
             if (stream.eat("(")) {
               return "number";
             }
             if (stream.match(textToMatch)) {
               if (token.shape === "number-dropdown") {
                  stream.eatSpace();
                  stream.eat("v");
               }
               if (stream.eat(")")) {
                  state.tokenizeIdx++;
               }
               return "number";
             }
           }
           if (token.shape === "string" || token.shape === "color") {
             if (stream.eat("[")) return "string";
             if (stream.match(textToMatch)) {
                if (stream.eat("]")) state.tokenizeIdx++;
                return "string";
             }
           }
        }

        if (stream.match(textToMatch)) {
          state.tokenizeIdx++;
          return token.style;
        }

        var m = stream.match(/^[a-zA-Z0-9\u00C0-\u017F]+/);
        if (m) return "variable";
        stream.next();
        return null;
      }
    };
  });

  var currentSuggestion = {
    text: "",
    widget: null,
    line: -1
  };

  function updateSuggestion() {
    if (currentSuggestion.widget) {
      currentSuggestion.widget.clear();
      currentSuggestion.widget = null;
    }
    currentSuggestion.text = "";
    currentSuggestion.line = -1;

    var cursor = editor.getCursor();
    var lineText = editor.getLine(cursor.line);
    var trimText = lineText.trimStart();
    
    if (trimText.length < 3 || cursor.ch < lineText.length) return;

    var langCode = obj.lang || "en";
    var lang = penguinblocks.allLanguages[langCode];
    if (!lang || !lang.commands) return;

    var match = null;
    var matchId = null;
    var lowerTrim = trimText.toLowerCase();

    for (var id in lang.commands) {
      var spec = lang.commands[id];
      if (spec === "when @blueFlag clicked") spec = "when flag clicked";
      if (spec.toLowerCase().startsWith(lowerTrim) && spec.length > trimText.length) {
        match = spec;
        matchId = id;
        break;
      }
    }

    function formatSpec(spec, id) {
      var info = penguinblocks.blocksById[id];
      var formatted = spec;
      
      formatted = formatted
        .replace(/%[nsd]/g, "()")
        .replace(/%[smc]/g, "[]")
        .replace(/%b/g, "<>");

      if (info && info.inputs) {
        info.inputs.forEach((inputType, index) => {
          var placeholder = "%" + (index + 1);
          var indicator = "[]";
          if (inputType === "%n" || inputType === "%d") indicator = "()";
          else if (inputType === "%b") indicator = "<>";
          
          formatted = formatted.replace(placeholder, indicator);
        });
      }
      
      formatted = formatted.replace(/%[0-9]+/g, "[]");
      
      return formatted;
    }

    if (match) {
      var formattedMatch = formatSpec(match, matchId);
      var suggestionText = formattedMatch.slice(trimText.length);
      
      currentSuggestion.text = formattedMatch;
      currentSuggestion.line = cursor.line;

      var span = document.createElement("span");
      span.className = "suggestion-ghost";
      span.textContent = suggestionText;
      currentSuggestion.widget = editor.setBookmark(
        {line: cursor.line, ch: lineText.length},
        {widget: span}
      );
    }
  }

  var obj = { script: "", lang: "" };
  extractHash();

  var editor = CodeMirror.fromTextArea(document.getElementById('editor'), {
    mode: "scratchblocks",
    lineNumbers: true,
    lineWrapping: true,
    theme: "default",
    extraKeys: {
      "Tab": function(cm) {
        if (currentSuggestion.text) {
          var line = currentSuggestion.line;
          var oldText = cm.getLine(line);
          var indent = oldText.match(/^\s*/)[0];
          cm.replaceRange(indent + currentSuggestion.text, {line: line, ch: 0}, {line: line, ch: oldText.length});
          return;
        }
        return CodeMirror.Pass;
      }
    }
  });

  editor.on('cursorActivity', updateSuggestion);
  editor.on('blur', function() {
    if (currentSuggestion.widget) {
      currentSuggestion.widget.clear();
      currentSuggestion.widget = null;
    }
  });

  var exportSVGLink;
  var exportPNGLink;

  editor.on('change', function () {
    obj.script = editor.getValue();
    objUpdated();
  });

  var chooseLang = document.getElementById('choose-lang');

  var languageCodes = Object.keys(penguinblocks.allLanguages)
  languageCodes.sort()
  languageCodes.forEach(function (code) {
    if (code === "en") return
    var option = document.createElement("option")
    option.value = code

    var language = penguinblocks.allLanguages[code]
    option.textContent = language.name && language.altName ? `${language.name} — ${language.altName}` : language.name || language.altName || code
    chooseLang.appendChild(option)
  })

  var incompleteLangs = [];
  var newOnlyLangs = [];
  [].slice.apply(chooseLang.options).forEach(function (el) {
    var text = el.textContent;
    if (/\*/.test(text)) incompleteLangs.push(el.value);
    if (/\†/.test(text)) newOnlyLangs.push(el.value);
  });

  var langStatus = document.createTextNode("");
  document.getElementById('lang-status').appendChild(langStatus);

  chooseLang.addEventListener('change', function (e) {
    obj.lang = chooseLang.value;
    console.log(obj);
    objUpdated();
  });

  var chooseStyle = document.getElementById('choose-style');
  chooseStyle.value = localStorage.getItem('penguinblocks-style') || 'scratch3';
  chooseStyle.addEventListener('change', function () {
    localStorage.setItem('penguinblocks-style', chooseStyle.value);
    objUpdated();
  });

  var zoomScale = parseFloat(localStorage.getItem('penguinblocks-zoom')) || 0.675;
  var zoomControls;
  var zoomLabel;
  
  function createZoomControls() {
    if (!zoomControls) {
      zoomControls = document.createElement('span');
      zoomControls.className = 'zoom-controls';
      zoomControls.style.display = 'none';
      
      var zoomOutBtn = document.createElement('button');
      zoomOutBtn.id = 'zoom-out';
      zoomOutBtn.title = 'Zoom out';
      zoomOutBtn.textContent = '−';
      
      zoomLabel = document.createElement('span');
      zoomLabel.id = 'zoom-label';
      zoomLabel.textContent = '67%';
      
      var zoomInBtn = document.createElement('button');
      zoomInBtn.id = 'zoom-in';
      zoomInBtn.title = 'Zoom in';
      zoomInBtn.textContent = '+';
      
      var zoomHint = document.createElement('span');
      zoomHint.className = 'zoom-hint';
      var isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
      zoomHint.textContent = isTouch ? '(you can pinch the screen to zoom)' : '(you can also use the scroll wheel)';
      
      zoomControls.appendChild(zoomOutBtn);
      zoomControls.appendChild(zoomLabel);
      zoomControls.appendChild(zoomInBtn);
      zoomControls.appendChild(zoomHint);
      
      document.body.appendChild(zoomControls);
    }
  }
  
  createZoomControls();
  
  function updateZoomLabel() {
    zoomLabel.textContent = Math.round(zoomScale * 100) + '%';
  }
  updateZoomLabel();

  document.getElementById('zoom-in').addEventListener('click', function () {
    zoomScale = Math.min(zoomScale + 0.1, 5);
    localStorage.setItem('penguinblocks-zoom', zoomScale.toString());
    updateZoomLabel();
    objUpdated();
  });

  document.getElementById('zoom-out').addEventListener('click', function () {
    zoomScale = Math.max(zoomScale - 0.1, 0.1);
    localStorage.setItem('penguinblocks-zoom', zoomScale.toString());
    updateZoomLabel();
    objUpdated();
  });

  var lastPinchDist = 0;
  document.getElementById('preview').addEventListener('touchstart', function (e) {
    if (e.touches.length === 2) {
      lastPinchDist = Math.hypot(
        e.touches[0].pageX - e.touches[1].pageX,
        e.touches[0].pageY - e.touches[1].pageY
      );
    }
  }, { passive: false });

  document.getElementById('preview').addEventListener('touchmove', function (e) {
    if (e.touches.length === 2) {
      var dist = Math.hypot(
        e.touches[0].pageX - e.touches[1].pageX,
        e.touches[0].pageY - e.touches[1].pageY
      );
      
      var diff = dist - lastPinchDist;
      if (Math.abs(diff) > 2) {
        zoomScale = Math.max(0.1, Math.min(5, zoomScale + (diff * 0.005)));
        localStorage.setItem('penguinblocks-zoom', zoomScale.toString());
        updateZoomLabel();
        objUpdated();
        lastPinchDist = dist;
      }
      e.preventDefault();
    }
  }, { passive: false });

  document.getElementById('preview').addEventListener('wheel', function (e) {
    if (e.deltaY < 0) {
      zoomScale = Math.min(zoomScale + 0.05, 5);
    } else {
      zoomScale = Math.max(zoomScale - 0.05, 0.1);
    }
    localStorage.setItem('penguinblocks-zoom', zoomScale.toString());
    updateZoomLabel();
    objUpdated();
    e.preventDefault();
  }, { passive: false });


  function extractHash() {
    var newObj = decodeHash();
    if (!newObj || !newObj.script) {
      newObj = {
        script: "",
        lang: obj.lang,
      };
    }

    if (newObj.lang !== obj.lang || newObj.script !== obj.script) {
      obj = newObj;
      return true;
    }
    return false;
  }

  function decodeHash() {
    var hash = location.href.split('#')[1];
    if (!hash) return;

    if (!/^\?/.test(hash)) {
      return {
        script: decodeURIComponent(hash),
      };
    } else {
      var newObj = {};
      var parts = hash.slice(1).split('&');
      parts.forEach(function (part) {
        var match = /^(.*)=(.*)$/.exec(part);
        if (!match) return;
        var key = decodeURIComponent(match[1]);
        var value = decodeURIComponent(match[2]);
        if (key === "lang" || key === "script") {
          newObj[key] = value;
        }
      });
      return newObj;
    }
  }

  function download(filename, content) {
    const elem = document.createElement("a");
    elem.hidden = true;
    elem.download = filename;
    elem.href = content;
    document.body.appendChild(elem);
    elem.click();
    document.body.removeChild(elem);
  }

  function objUpdated() {
    if (obj.lang) {
      location.hash = ('#?lang=' + encodeURIComponent(obj.lang) +
        '&script=' + encodeURIComponent(obj.script));
    } else if (obj.script) {
      location.hash = '#' + encodeURIComponent(obj.script);
    } else {
      if (!(location.hash == '' || location.hash == '#')) {
        location.hash = '#';
      }
    }

    var doc = window.doc = penguinblocks.parse(obj.script, {
      languages: obj.lang ? ['en', obj.lang] : ['en'],
      icons: customIcons,
    });

    var selectedStyle = chooseStyle.value;
    var docView = penguinblocks.newView(doc, {
      style: selectedStyle,
      scale: zoomScale,
      icons: customIcons,
    });

    var svg = docView.render();
    preview.innerHTML = "";
    preview.appendChild(svg);

    if (/^scratch3($|-)/.test(selectedStyle)) {
      svg.classList.add("scratch3");
    }
    svg.classList.add("penguinblocks-style-" + selectedStyle);

    setTimeout(function () {
      if (!exportSVGLink) exportSVGLink = document.createElement('a');
      exportSVGLink.onclick = () => download("penguinblocks.svg", docView.exportSVG());
      exportSVGLink.textContent = "Export SVG";
      exportSVGLink.className = 'export-link';
      if (!exportSVGLink.isConnected) document.body.appendChild(exportSVGLink);

      if (!exportPNGLink) exportPNGLink = document.createElement('a');
      exportPNGLink.onclick = () => docView.exportPNG((url) => download("penguinblocks.png", url));
      exportPNGLink.textContent = "Export PNG";
      exportPNGLink.className = 'export-link';
      if (!exportPNGLink.isConnected) document.body.appendChild(exportPNGLink);

      zoomControls.style.display = 'inline-block';
      exportPNGLink.parentNode.insertBefore(zoomControls, exportPNGLink.nextSibling);
    }, 0);

    var lang = penguinblocks.allLanguages[obj.lang]
    langStatus.textContent = lang ? `${lang.percentTranslated}%` : "";
  }

  setInterval(function () {
    if (extractHash()) {
      updatedFromHash();
    }
  }, 200);

  function updatedFromHash() {
    var cursor = editor.getCursor();
    var scrollInfo = editor.getScrollInfo();
    editor.setValue(obj.script);
    editor.setCursor(cursor);
    editor.scrollTo(scrollInfo.left, scrollInfo.top);
    objUpdated();
    chooseLang.value = obj.lang || "";
  }

  updatedFromHash();
  updateIconsList();

  var modal = document.getElementById("settings-modal");
  var btn = document.getElementById("open-settings");
  var span = document.getElementsByClassName("close-button")[0];

  btn.onclick = function (e) {
    e.preventDefault();
    modal.style.display = "block";
  }

  span.onclick = function () {
    modal.style.display = "none";
  }

  window.onclick = function (event) {
    if (event.target == modal) {
      modal.style.display = "none";
    }
  }

</script>

<script>
  function showDiff(e) {
    document.body.classList[e.ctrlKey ? 'add' : 'remove']('cmp');
    document.body.classList[e.altKey ? 'add' : 'remove']('diff');
  }
  document.addEventListener('keydown', showDiff);
  document.addEventListener('keyup', showDiff);

</script>
</body>
