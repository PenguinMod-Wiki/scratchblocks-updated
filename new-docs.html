<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>new docs - penguinblocks dev</title>
    <meta name="description" content="Use penguinblocks to turn text into a visual Scratch script!">
    
    <meta property="og:title" content="penguinblocks dev">
    <meta property="og:description" content="Use penguinblocks to turn text into a visual Scratch script!">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="penguinblocks dev">
    <meta name="twitter:description" content="Use penguinblocks to turn text into a visual Scratch script!">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <script src="theme.js"></script>
    <style>
        html {
            scroll-behavior: smooth;
        }
        body {
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-color);
        }
        .container {
            background: var(--container-bg);
            padding: 2em;
            margin-top: 1em;
            border: 1px solid var(--container-border);
            flex: 1;
            min-width: 0;
            margin-bottom: 2em;
        }
        .toc {
            position: sticky;
            top: 1em;
            background: var(--container-bg);
            padding: 1.5em;
            border: 1px solid var(--container-border);
            width: 20em;
            max-height: calc(100vh - 2em);
            overflow-y: auto;
            margin-top: 1em;
        }
        .toc h3 {
            margin-top: 0;
            margin-bottom: 1em;
            font-size: 1.2em;
            border-bottom: 1px solid var(--container-border);
            padding-bottom: 0.5em;
        }
        .toc ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .toc li {
            margin-bottom: 0.5em;
        }
        .toc a {
            background: none;
            display: block;
            padding: 0.2em 0;
            color: var(--text-color);
            transition: color 0.2s;
        }
        .toc a:hover {
            color: var(--text-color);
            background: var(--toc-hover-bg);
            border-bottom: none;
        }
        .example {
            margin: 2em 0;
            padding: 1em;
            border: 1px solid var(--container-border);
            background: var(--container-bg);
        }
        .blocks {
            display: block;
            margin-top: 1em;
        }
        code {
            background: var(--button-bg);
            padding: 0.2em 0.4em;
            border-radius: 5px;
            white-space: pre-wrap;
            overflow-wrap: break-word;
            border: 1px solid var(--button-border);
            font-family: 'Courier New', Courier, monospace;
            display: inline-block;
            vertical-align: middle;
            max-width: 100%;
            color: var(--text-color);
        }

        .code-container {
            position: relative;
            margin: 1.5em 0;
            width: 100%;
        }

        .code-container.example {
            margin: 2em 0;
            border: 1px solid var(--container-border);
            background: var(--container-bg);
            padding: 1em;
            border-radius: 8px;
        }

        .code-container:not(.example) pre {
            background: var(--button-bg);
            border: 1px solid var(--button-border);
            border-radius: 8px;
            padding: 1em;
            overflow-x: auto;
            margin: 0;
        }

        .code-container:not(.example) pre code {
            background: none;
            border: none;
            padding: 0;
            display: block;
            border-radius: 0;
            white-space: pre;
        }

        .copy-button {
            position: absolute !important;
            top: 0.6em !important;
            right: 0.6em !important;
            left: auto !important;
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            background: none !important;
            border: none !important;
            box-shadow: none !important;
            cursor: pointer !important;
            color: var(--text-color) !important;
            z-index: 100 !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            padding: 4px !important;
            margin: 0 !important;
            width: 32px !important;
            height: 32px !important;
            min-width: 0 !important;
            border-radius: 4px !important;
        }

        .code-container:hover .copy-button {
            opacity: 0.6;
        }

        .copy-button:hover {
            opacity: 1 !important;
            transform: scale(1.1);
        }

        .copy-button svg {
            width: 20px;
            height: 20px;
            stroke-width: 2;
            pointer-events: none;
            display: block;
        }

        .main-content {
            display: flex;
            width: 100%;
            max-width: 80em;
            gap: 2em;
            align-items: flex-start;
            padding: 0 1em;
        }
        h1 {
            border-bottom: 1px solid var(--container-border);
            padding-bottom: 0.3em;
        }
        h2 {
            margin-top: 1.5em;
            border-bottom: 1px solid var(--container-border);
            padding-bottom: 0.3em;
            font-weight: normal;
            font-size: 1.3em;
        }
        header {
            width: 100%;
            max-width: 80em;
            padding: 0 1em;
        }
        #title {
            background: none;
        }

        @media screen and (max-width: 60em) {
            .main-content {
                flex-direction: column-reverse;
                align-items: stretch;
            }
            .toc {
                position: static;
                width: 100%;
                max-height: none;
            }
        }

        :root pre[class*="language-"],
        :root code[class*="language-"] {
            color: var(--text-color);
            text-shadow: none;
        }

        :root .token.comment,
        :root .token.prolog,
        :root .token.doctype,
        :root .token.cdata {
            color: #998;
            font-style: italic;
        }

        :root .token.punctuation {
            color: var(--text-color);
        }

        :root .token.property,
        :root .token.tag,
        :root .token.boolean,
        :root .token.number,
        :root .token.constant,
        :root .token.symbol,
        :root .token.deleted {
            color: #905;
        }

        :root .token.selector,
        :root .token.attr-name,
        :root .token.string,
        :root .token.char,
        :root .token.builtin,
        :root .token.inserted {
            color: #690;
        }

        :root .token.operator,
        :root .token.entity,
        :root .token.url,
        :root .language-css .token.string,
        :root .style .token.string {
            color: #9a6e3a;
        }

        :root .token.atrule,
        :root .token.attr-value,
        :root .token.keyword {
            color: #07a;
        }

        :root .token.function,
        :root .token.class-name {
            color: #dd4a68;
        }

        :root .token.regex,
        :root .token.important,
        :root .token.variable {
            color: #e90;
        }
    </style>
</head>
<body>

<header>
    <h1>
      penguinblocks dev
      <span>
        <a href="index.html"><b>back to editor</b></a>
      </span>
    </h1>
</header>

<div class="main-content">
    <div id="content" class="container">
        Loading...
    </div>
    <nav class="toc">
        <h3>Contents</h3>
        <ul id="toc-list"></ul>
    </nav>
</div>

<script src="build/penguinblocks.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
<script>
    const CLIPBOARD_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>`;
    const CHECK_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;

    window.copyCode = function(button) {
        const container = button.closest('.code-container');
        const code = container.querySelector('pre code').textContent;
        navigator.clipboard.writeText(code).then(() => {
            button.innerHTML = CHECK_SVG;
            button.style.color = '#33D833';
            setTimeout(() => {
                button.innerHTML = CLIPBOARD_SVG;
                button.style.color = '';
            }, 2000);
        });
    };

    async function loadContent() {
        try {
            const response = await fetch('new-docs.md');
            const markdown = await response.text();

            function escapeHTML(text) {
                return text
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }

            marked.use({
                tokenizer: {
                    codespan(src) {
                        const match = src.match(/^(`+)([^`]|[^`][\s\S]*?[^`])\1(?!`)/);
                        if (match) {
                            return {
                                type: 'codespan',
                                raw: match[0],
                                text: match[2]
                            };
                        }
                        return false;
                    }
                },
                renderer: {
                    code(token) {
                        const { text, lang } = token;
                        const escapedText = escapeHTML(text);
                        if (lang === 'blocks') {
                            return `
                                <div class="code-container example">
                                    <pre class="blocks">${escapedText}</pre>
                                </div>`;
                        }
                        return `
                            <div class="code-container">
                                <button class="copy-button" title="Copy code" onclick="copyCode(this)">${CLIPBOARD_SVG}</button>
                                <pre><code class="language-${lang || 'none'}">${escapedText}</code></pre>
                            </div>`;
                    },
                    codespan(token) {
                        return `<code>${escapeHTML(token.text)}</code>`;
                    }
                }
            });

            const html = marked.parse(markdown);
            const contentDiv = document.getElementById('content');
            contentDiv.innerHTML = html;

            const tocList = document.getElementById('toc-list');
            const headers = contentDiv.querySelectorAll('h1, h2, h3');
            headers.forEach((header, index) => {
                const id = header.textContent.toLowerCase().replace(/[^a-z0-9]+/g, '-');
                header.id = id;
                
                const li = document.createElement('li');
                const a = document.createElement('a');
                a.href = `#${id}`;
                a.textContent = header.textContent;
                if (header.tagName === 'H1') {
                    a.style.fontWeight = 'bold';
                }
                if (header.tagName === 'H2') {
                    li.style.marginLeft = '1.5em';
                } else if (header.tagName === 'H3') {
                    li.style.marginLeft = '3em';
                }
                li.appendChild(a);
                tocList.appendChild(li);
            });

            if (window.penguinblocks) {
                penguinblocks.renderMatching('pre.blocks', {
                    style: 'scratch3',
                    languages: ['en']
                });
            }

            if (window.Prism) {
                Prism.highlightAll();
            }
        } catch (e) {
            console.error(e);
            document.getElementById('content').textContent = 'Error loading content.';
        }
    }

    loadContent();
</script>

</body>
</html>
